name: Release Main

# 主体（Launcher + SDK NuGet + dotnet tool）发布工作流
# 触发标签：V*           例如 V1.2.3、V1.2.3-preview.1、V1.2.3-beta.1
# 产物：
#   - 主体 SDK NuGet 包（LYBox.Plugin.Generators / LYBox.Plugin.Shared）
#   - dotnet tool NuGet 包（LYBox.MockServer，命令名 lybox-mock）
#   - Launcher 自包含发布包（win-x64 / win-arm64 / linux-x64 / linux-arm64）
# NuGet 发布：使用 Trusted Publishing（OIDC 短期令牌），无需长期 API key。
#   前置条件：
#     1. nuget.org → 账户 → 受信任的发布 → 添加策略（Repository Owner=lytree, Repository=AvaloniaTemplate, Workflow File=release-host.yml, Environment=release）
#     2. GitHub 仓库 → Settings → Environments → 新建 release 环境 → 添加 secret NUGET_USER=<nuget.org 用户名>
#
# 版本解析：
#   - tag push（V2.3.0 / V2.3.0-preview.1）：由 resolve_context 调用 dotnet gitversion 读取标签版本
#   - workflow_dispatch：用户输入版本号，跳过 GitVersion，直接传入 --host-version
#   - build.cs 内部也集成了 GitVersion 兜底，CI 通过 --host-version 显式覆盖以确保一致性

on:
  push:
    tags:
      - 'V*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号（例如 1.2.3、1.2.3-preview.1、1.2.3-beta.1；手动触发必填，会发布到 V<version>）'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-host-${{ github.ref_name || inputs.version }}
  cancel-in-progress: false

env:
  DOTNET_NOLOGO: 'true'
  DOTNET_CLI_TELEMETRY_OPTOUT: 'true'
  MAIN_PROJECT_NAME: 'LYBox.Launcher.Desktop'

jobs:
  resolve_context:
    name: Resolve Release Context
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ctx.outputs.version }}
      tag_name: ${{ steps.ctx.outputs.tag_name }}
      is_prerelease: ${{ steps.ctx.outputs.is_prerelease }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0  # GitVersion 需要完整历史

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore dotnet tools (GitVersion.Tool)
        run: dotnet tool restore

      - name: Resolve version via GitVersion or input
        id: ctx
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # 手动触发：使用用户输入的版本号，不调用 GitVersion
            VERSION="${{ inputs.version }}"
            TAG="V${VERSION}"
          else
            # 标签触发：通过 GitVersion 读取标签对应的版本号
            TAG="${GITHUB_REF_NAME}"
            VERSION="$(dotnet gitversion /showvariable MajorMinorPatch /nocache)"
            # 若标签带 prerelease（如 V2.3.0-preview.1），追加 prerelease 后缀
            FULL_SEMVER="$(dotnet gitversion /showvariable FullSemVer /nocache)"
            PRE_RELEASE_TAG="$(dotnet gitversion /showvariable PreReleaseTag /nocache)"
            if [ -n "$PRE_RELEASE_TAG" ]; then
              VERSION="$FULL_SEMVER"
            fi
          fi

          # 校验版本号格式
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-(preview|beta|bate)(\.[0-9]+)?)?$ ]]; then
            echo "::error::版本号格式无效: $VERSION。请使用 x.y.z、x.y.z-preview.N 或 x.y.z-beta.N"
            exit 1
          fi

          # 判断是否为预发布版本
          if [[ "$VERSION" =~ - ]]; then
            IS_PRERELEASE="true"
          else
            IS_PRERELEASE="false"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag_name=$TAG" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=$IS_PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "Resolved release: tag=$TAG version=$VERSION prerelease=$IS_PRERELEASE"

  pack_sdk:
    name: Pack Host SDK NuGet
    needs: resolve_context
    runs-on: ubuntu-latest
    environment: release  # GitHub 环境：承载 NUGET_USER secret 与审批门禁
    permissions:
      id-token: write     # OIDC 令牌颁发（NuGet 可信发布必需）
      contents: read      # 仅读取代码，发布 GitHub Release 由 release 作业负责
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore dotnet tools
        run: dotnet tool restore

      - name: Build launcher + pack SDK
        run: |
          dotnet build/build.cs \
            --build=bin \
            --host-version=${{ needs.resolve_context.outputs.version }}

      - name: Upload main SDK NuGet artifacts
        uses: actions/upload-artifact@v5
        with:
          name: main-sdk-nuget
          path: bin/nuget/*.nupkg
          if-no-files-found: error
          retention-days: 7

      - name: NuGet login (OIDC → 短期 API key)
        id: login
        uses: NuGet/login@v1
        with:
          user: ${{ secrets.NUGET_USER }}  # nuget.org 用户名（profile name，非邮箱）

      - name: Push SDK NuGet packages
        run: |
          for pkg in bin/nuget/*.nupkg; do
            echo "Pushing $pkg"
            dotnet nuget push "$pkg" \
              --api-key ${{ steps.login.outputs.NUGET_API_KEY }} \
              --source https://api.nuget.org/v3/index.json \
              --skip-duplicate
          done

  pack_tool:
    name: Pack Tool NuGet
    needs: resolve_context
    runs-on: ubuntu-latest
    environment: release  # GitHub 环境：承载 NUGET_USER secret 与审批门禁
    permissions:
      id-token: write     # OIDC 令牌颁发（NuGet 可信发布必需）
      contents: read      # 仅读取代码，发布 GitHub Release 由 release 作业负责
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore dotnet tools
        run: dotnet tool restore

      - name: Build & pack tool
        run: |
          dotnet build/build.cs \
            --build=tool \
            --host-version=${{ needs.resolve_context.outputs.version }}

      - name: Verify tool package
        run: |
          echo "=== Tool NuGet packages ==="
          ls -lh bin/tools/*.nupkg
          echo ""
          echo "=== Package metadata ==="
          for pkg in bin/tools/*.nupkg; do
            echo "Inspecting: $pkg"
            # 列出包内 ToolCommandName 配置
            unzip -p "$pkg" "*.nuspec" | grep -i "packageType\|toolCommandName\|ToolCommandName" || true
          done

      - name: Upload tool NuGet artifacts
        uses: actions/upload-artifact@v5
        with:
          name: tool-nuget
          path: bin/tools/*.nupkg
          if-no-files-found: error
          retention-days: 7

      - name: NuGet login (OIDC → 短期 API key)
        id: login
        uses: NuGet/login@v1
        with:
          user: ${{ secrets.NUGET_USER }}  # nuget.org 用户名（profile name，非邮箱）

      - name: Push tool NuGet package
        run: |
          for pkg in bin/tools/*.nupkg; do
            echo "Pushing $pkg"
            dotnet nuget push "$pkg" \
              --api-key ${{ steps.login.outputs.NUGET_API_KEY }} \
              --source https://api.nuget.org/v3/index.json \
              --skip-duplicate
          done

  publish_host:
    name: Publish Launcher (${{ matrix.rid }})
    needs: resolve_context
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: windows-latest, rid: win-x64 }
          - { os: windows-latest, rid: win-arm64 }
          - { os: ubuntu-latest,  rid: linux-x64 }
          - { os: ubuntu-latest,  rid: linux-arm64 }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore dotnet tools
        run: dotnet tool restore

      - name: Publish launcher
        shell: bash
        run: |
          dotnet build/build.cs \
            --build=bin \
            --runtime-identifier=${{ matrix.rid }} \
            --self-contained=true \
            --host-version=${{ needs.resolve_context.outputs.version }}

      - name: Zip published output
        shell: pwsh
        run: |
          Compress-Archive -Path 'bin/bin/${{ matrix.rid }}/*' -DestinationPath '${{ env.MAIN_PROJECT_NAME }}-${{ matrix.rid }}-${{ needs.resolve_context.outputs.version }}.zip' -Force

      - name: Verify zip
        shell: pwsh
        run: |
          Get-Item "${{ env.MAIN_PROJECT_NAME }}-${{ matrix.rid }}-${{ needs.resolve_context.outputs.version }}.zip" | Format-List Name, Length, LastWriteTime

      - name: Upload main artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ env.MAIN_PROJECT_NAME }}-${{ matrix.rid }}
          path: ${{ env.MAIN_PROJECT_NAME }}-${{ matrix.rid }}-${{ needs.resolve_context.outputs.version }}.zip
          if-no-files-found: error
          retention-days: 7

  release:
    name: GitHub Release
    needs: [resolve_context, pack_sdk, pack_tool, publish_host]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        if: github.event_name == 'workflow_dispatch'
        with:
          fetch-depth: 0

      - name: Create tag for manual release
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ needs.resolve_context.outputs.tag_name }}"
          git push origin "${{ needs.resolve_context.outputs.tag_name }}"

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve_context.outputs.tag_name }}
          name: ${{ needs.resolve_context.outputs.tag_name }}
          prerelease: ${{ needs.resolve_context.outputs.is_prerelease }}
          generate_release_notes: true
          body: |
            ## LYBox v${{ needs.resolve_context.outputs.version }}

            ### SDK NuGet 包
            - `LYBox.Plugin.Generators` ${{ needs.resolve_context.outputs.version }}
            - `LYBox.Plugin.Shared` ${{ needs.resolve_context.outputs.version }}

            ```bash
            dotnet add package LYBox.Plugin.Generators --version ${{ needs.resolve_context.outputs.version }}
            dotnet add package LYBox.Plugin.Shared --version ${{ needs.resolve_context.outputs.version }}
            ```

            ### dotnet tool（lybox-mock）

            ```bash
            dotnet tool install --global LYBox.MockServer --version ${{ needs.resolve_context.outputs.version }}
            lybox-mock --help
            ```

            升级：
            ```bash
            dotnet tool update --global LYBox.MockServer
            ```

            ### Launcher 自包含发布包
            解压对应平台的 zip 后直接运行 `LYBox.Launcher.Desktop`（无需安装 .NET 运行时）。
          files: |
            artifacts/main-sdk-nuget/*.nupkg
            artifacts/tool-nuget/*.nupkg
            artifacts/${{ env.MAIN_PROJECT_NAME }}-win-x64/*.zip
            artifacts/${{ env.MAIN_PROJECT_NAME }}-win-arm64/*.zip
            artifacts/${{ env.MAIN_PROJECT_NAME }}-linux-x64/*.zip
            artifacts/${{ env.MAIN_PROJECT_NAME }}-linux-arm64/*.zip
