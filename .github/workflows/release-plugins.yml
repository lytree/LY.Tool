name: Release Plugins

# 插件发布工作流（与主体分开构建）
# 触发标签：
#   plugin-V*                      例如 plugin-V1.0.0、plugin-V1.0.0-preview.1、plugin-V1.0.0-beta.1  → 打包全部插件，并使用标签版本覆盖插件版本
#   plugin-<ProjectName>-V*         例如 plugin-LYBox.Plugin.DateTime-V1.2.0、plugin-LYBox.Plugin.DateTime-V1.2.0-beta.1 → 仅打包指定插件并覆盖其版本
# 产物：
#   - 插件 SDK NuGet 包（LYBox.Plugin.Generators / LYBox.Plugin.Shared，用于插件 restore）
#   - 各插件 zip 包（含 plugin.json 清单，剥离 .pdb/.xml/.deps.json/.runtimeconfig.json）
# 可选：配置 NUGET_API_KEY secret 后自动尝试推送插件 SDK 包到 nuget.org

on:
  push:
    tags:
      - 'plugin-V*'
      - 'plugin-*-V*'
  workflow_dispatch:
    inputs:
      version:
        description: '插件版本号（例如 1.2.3、1.2.3-preview.1、1.2.3-beta.1；手动触发必填）'
        required: true
        type: string
      plugin_filter:
        description: '插件过滤器（逗号分隔 ProjectName；留空=全部插件）'
        required: false
        default: ''
        type: string

permissions:
  contents: write

concurrency:
  group: release-plugin-${{ github.ref_name || inputs.version }}-${{ inputs.plugin_filter }}
  cancel-in-progress: false

env:
  DOTNET_NOLOGO: 'true'
  DOTNET_CLI_TELEMETRY_OPTOUT: 'true'

jobs:
  resolve-context:
    name: Resolve Plugin Release Context
    runs-on: ubuntu-latest
    outputs:
      plugin_filter: ${{ steps.ctx.outputs.plugin_filter }}
      plugin_version: ${{ steps.ctx.outputs.plugin_version }}
      tag_name: ${{ steps.ctx.outputs.tag_name }}
      release_name: ${{ steps.ctx.outputs.release_name }}
    steps:
      - name: Parse version, filter, and tag
        id: ctx
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
            FILTER="${{ inputs.plugin_filter }}"
            if [ -n "$FILTER" ]; then
              TAG="plugin-${FILTER}-V${VERSION}"
              NAME="Plugin ${FILTER} V${VERSION}"
            else
              TAG="plugin-V${VERSION}"
              NAME="Plugins V${VERSION}"
            fi
          else
            TAG="${GITHUB_REF_NAME}"
            if [[ "$TAG" =~ ^plugin-V([0-9]+\.[0-9]+\.[0-9]+(-(preview|beta|bate)(\.[0-9]+)?)?)$ ]]; then
              FILTER=""
              VERSION="${BASH_REMATCH[1]}"
              NAME="Plugins V${VERSION}"
            elif [[ "$TAG" =~ ^plugin-(.+)-V([0-9]+\.[0-9]+\.[0-9]+(-(preview|beta|bate)(\.[0-9]+)?)?)$ ]]; then
              FILTER="${BASH_REMATCH[1]}"
              VERSION="${BASH_REMATCH[2]}"
              NAME="Plugin ${FILTER} V${VERSION}"
            else
              echo "::error::无法识别的插件标签格式: $TAG。请使用 plugin-Vx.y.z、plugin-Vx.y.z-preview.N、plugin-Vx.y.z-beta.N 或 plugin-<ProjectName>-Vx.y.z(-preview.N|-beta.N)"
              exit 1
            fi
          fi

          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-(preview|beta|bate)(\.[0-9]+)?)?$ ]]; then
            echo "::error::版本号格式无效: $VERSION。请使用 x.y.z、x.y.z-preview.N 或 x.y.z-beta.N，例如 1.2.3-preview.1"
            exit 1
          fi

          echo "plugin_filter=$FILTER" >> "$GITHUB_OUTPUT"
          echo "plugin_version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag_name=$TAG" >> "$GITHUB_OUTPUT"
          echo "release_name=$NAME" >> "$GITHUB_OUTPUT"
          echo "Resolved plugin release: tag=$TAG filter='$FILTER' version=$VERSION"

  pack-plugin-sdk:
    name: Pack Plugin SDK NuGet
    needs: resolve-context
    runs-on: ubuntu-latest
    env:
      NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build plugin SDK NuGet feed
        run: |
          dotnet build/build.cs \
            --build=bin \
            --host-version=${{ needs.resolve-context.outputs.plugin_version }}

      - name: Upload plugin SDK NuGet artifacts
        uses: actions/upload-artifact@v4
        with:
          name: plugin-sdk-nuget
          path: bin/nuget/*.nupkg
          if-no-files-found: error
          retention-days: 7

      - name: Push plugin SDK NuGet packages (optional)
        if: env.NUGET_API_KEY != ''
        run: |
          for pkg in bin/nuget/*.nupkg; do
            echo "Pushing $pkg"
            dotnet nuget push "$pkg" \
              --api-key "$NUGET_API_KEY" \
              --source https://api.nuget.org/v3/index.json \
              --skip-duplicate
          done

  build-plugins:
    name: Build Plugins
    needs: [resolve-context, pack-plugin-sdk]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore plugin SDK NuGet to local feed
        uses: actions/download-artifact@v4
        with:
          name: plugin-sdk-nuget
          path: bin/nuget

      - name: Verify local feed
        run: |
          echo "Local NuGet feed contents:"
          ls -lh bin/nuget/

      - name: Build & pack plugins
        run: |
          ARGS="--build=plugin --plugin-version=${{ needs.resolve-context.outputs.plugin_version }}"
          if [ -n "${{ needs.resolve-context.outputs.plugin_filter }}" ]; then
            ARGS="$ARGS --plugin=${{ needs.resolve-context.outputs.plugin_filter }}"
          fi
          echo "Running: dotnet build/build.cs $ARGS"
          dotnet build/build.cs $ARGS

      - name: List plugin zips
        run: |
          echo "Generated plugin zips:"
          ls -lh bin/plugins/zip/

      - name: Upload plugin zips
        uses: actions/upload-artifact@v4
        with:
          name: plugin-zips
          path: bin/plugins/zip/*.zip
          if-no-files-found: error
          retention-days: 7

  release:
    name: GitHub Release
    needs: [resolve-context, pack-plugin-sdk, build-plugins]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        if: github.event_name == 'workflow_dispatch'
        with:
          fetch-depth: 0

      - name: Create tag for manual release
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ needs.resolve-context.outputs.tag_name }}"
          git push origin "${{ needs.resolve-context.outputs.tag_name }}"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve-context.outputs.tag_name }}
          name: ${{ needs.resolve-context.outputs.release_name }}
          generate_release_notes: true
          files: |
            artifacts/plugin-sdk-nuget/*.nupkg
            artifacts/plugin-zips/*.zip
